name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Build
        run: |
          npm install
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: https://api.viralauthoritypro.com
          NEXT_PUBLIC_APP_URL: https://viralauthoritypro.com
          NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p /var/www/viralauthoritypro
            chown -R root:root /var/www/viralauthoritypro

      - name: Upload code to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "./*"
          target: "/var/www/viralauthoritypro"
          rm: true
          exclude: "node_modules, .git, .github, .next"

      - name: Run setup and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/viralauthoritypro
            
            # Fix Nginx first to avoid crashes
            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            cp infra/nginx.conf /etc/nginx/sites-available/viralauthoritypro
            ln -sf /etc/nginx/sites-available/viralauthoritypro /etc/nginx/sites-enabled/
            
            # Setup environment and dependencies
            chmod +x scripts/setup_vps.sh
            ./scripts/setup_vps.sh
            
            # Backend
            cd backend && npm install
            pm2 delete vpro-api || true
            pm2 start index.js --name "vpro-api"
            
            # Frontend
            cd ..
            npm install
            npm run build
            pm2 delete vpro-app || true
            pm2 start npm --name "vpro-app" -- start
            
            # Final Nginx restart
            sudo nginx -t && sudo systemctl restart nginx
