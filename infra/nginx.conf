# Nginx Configuration for Vytrixe Production
# Place this in /etc/nginx/sites-available/vytrixe

server {
    listen 80;
    server_name vytrixe.com www.vytrixe.com;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        proxy_pass http://localhost:3000; # Next.js frontend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}

# API Subdomain Configuration
server {
    listen 80;
    server_name api.vytrixe.com;

    location / {
        proxy_pass http://localhost:3001; # Node.js backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # CORS Handling (if not handled by Express)
        # add_header 'Access-Control-Allow-Origin' '*';
    }
}
